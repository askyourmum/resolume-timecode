<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Timecode Monitor</title>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100;400;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #FDFBF7;
            font-family: 'Roboto Mono', monospace;
            font-size: 1em;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        a { color: #2494ff; }
        label { margin-right: 1em; }

        /* ── Clip Name (above card) ── */
        #clip-name-row {
            padding: 0.4em 1em 0.2em;
            cursor: ns-resize;
            user-select: none;
            line-height: 1.2;
        }
        #clip-name-row .row-label { color: #888; font-weight: 400; }
        #clip-name-row .row-value { color: #ffffff; font-weight: 600; }

        /* ── Card boundary ── */
        #tableborder {
            border: 6px solid #4b5457;
            border-radius: 40px;
            background-color: #111417;
            margin: 0.4em 2em 1em;
            padding: 0.6em 0 0.8em;
            overflow: hidden;
        }

        /* ── Info rows inside card ── */
        .info-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            padding: 0.15em 1.5em;
            cursor: ns-resize;
            user-select: none;
            line-height: 1.15;
        }
        .info-row:hover { background: rgba(255,255,255,0.03); }

        .row-label {
            text-align: right;
            color: #888888;
            font-weight: 400;
            white-space: nowrap;
            min-width: 9em;
            padding-right: 0.8em;
        }
        .row-value {
            text-align: left;
            font-weight: 100;
            letter-spacing: 0.04em;
            min-width: 12em;
        }

        .elapsed-value  { color: #45aaff; }
        .remain-value   { color: #ff9945; }
        .total-value    { color: #aaaaaa; }
        .clock-value    { color: #aaaaaa; }

        /* scroll hint tooltip */
        .info-row:hover::after {
            content: '↕ scroll to resize';
            font-size: 0.65em;
            color: #555;
            margin-left: 1em;
            font-weight: 400;
        }

        /* ── Settings panel ── */
        #settings-panel {
            text-align: left;
            margin-left: 2em;
            margin-top: 1em;
        }
    </style>
</head>

<body>

<!-- Clip Name — outside and above the card -->
<div id="clip-name-row" data-key="clipname">
    <span class="row-label">Clip Name: </span><span class="row-value" id="clipname">None</span>
</div>

<!-- Main card -->
<div id="tableborder">
    <div class="info-row" data-key="elapsed">
        <span class="row-label">Elapsed</span>
        <span class="row-value elapsed-value" id="info-elapsed">+00:00:00.000</span>
    </div>
    <div class="info-row" data-key="remaining">
        <span class="row-label">Remaining</span>
        <span class="row-value remain-value" id="info-remaining">-00:00:00.000</span>
    </div>
    <div class="info-row" data-key="total">
        <span class="row-label">Clip Length</span>
        <span class="row-value total-value" id="info-total">00:00:00.000</span>
    </div>
    <div class="info-row" data-key="clock">
        <span class="row-label">System Time</span>
        <span class="row-value clock-value" id="system-clock">--:--:--</span>
    </div>
</div>

<!-- Settings -->
<details id="settings-panel">
    <summary style="font-size:1.25em;">Settings</summary>
    <div>Clip Length: <strong id="ms">00:00:00.000</strong></div>
    <div>Server Status: <strong id="status">Server Stopped</strong></div>
    <br/>
    <div>
        <button onclick="resetSizes()" style="font-family:inherit;padding:0.3em 1em;border-radius:6px;cursor:pointer;background:#222;color:#ccc;border:1px solid #555;">Reset row sizes</button>
    </div>
    <br/>
    <div>
    <input type="number" id="padding" value="0" min="0" step="1" onchange="updatePadding()" style="width:3em;border-radius:5px;margin-left:2px;">
    <label style="margin-left:-0.5em;" for="padding">em Top Padding</label>
    </div>
    <p>Fork of <a href="https://github.com/chabad360/resolume-timecode">chabad360/resolume-timecode</a></p>
</details>

<script src="osc.min.js" type="module"></script>
<script src="main.js" type="module"></script>
<script type="text/javascript">

    // ── Default font sizes in vw ──
    const DEFAULTS = {
        clipname:  3.5,
        elapsed:   5.0,
        remaining: 5.0,
        total:     3.5,
        clock:     3.5,
    };

    // Min / max clamps in vw
    const MIN_VW = 1.0;
    const MAX_VW = 18.0;

    // Load saved sizes from localStorage, fall back to defaults
    const sizes = {};
    for (const key in DEFAULTS) {
        const saved = localStorage.getItem('row-size-' + key);
        sizes[key] = saved !== null ? parseFloat(saved) : DEFAULTS[key];
    }

    // Map data-key → the element(s) whose font-size we control
    // For clipname row, we set on the whole row div.
    // For others, we set on .row-label and .row-value separately (label = 60% of value).
    function applySize(key) {
        const vw = sizes[key];
        if (key === 'clipname') {
            const row = document.getElementById('clip-name-row');
            row.style.fontSize = vw + 'vw';
        } else {
            const row = document.querySelector(`.info-row[data-key="${key}"]`);
            if (!row) return;
            row.querySelector('.row-label').style.fontSize = (vw * 0.6) + 'vw';
            row.querySelector('.row-value').style.fontSize = vw + 'vw';
        }
        localStorage.setItem('row-size-' + key, vw);
    }

    // Apply all on load
    for (const key in sizes) applySize(key);

    // Scroll handler — attach to all scrollable rows
    function onRowWheel(e) {
        e.preventDefault();
        const key = e.currentTarget.dataset.key;
        if (!key || !(key in sizes)) return;
        // deltaY > 0 = scroll down = shrink; < 0 = scroll up = grow
        const delta = e.deltaY > 0 ? -0.2 : 0.2;
        sizes[key] = Math.min(MAX_VW, Math.max(MIN_VW, sizes[key] + delta));
        applySize(key);
    }

    // Attach wheel listeners
    document.querySelectorAll('.info-row, #clip-name-row').forEach(row => {
        row.addEventListener('wheel', onRowWheel, { passive: false });
    });

    function resetSizes() {
        for (const key in DEFAULTS) {
            sizes[key] = DEFAULTS[key];
            applySize(key);
        }
    }

    function updatePadding() {
        const padding = document.getElementById('padding').value;
        document.getElementById('clip-name-row').style.paddingTop = padding + 'em';
    }

    updatePadding();
</script>
</body>
</html>
