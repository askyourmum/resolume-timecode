<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Timecode Monitor</title>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100;400;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #FDFBF7;
            font-family: 'Roboto Mono', monospace;
            font-size: 1em;
            text-align: center;
            /* centre the card wrapper both axes */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        a { color: #2494ff; }
        label { margin-right: 1em; }

        /* ── Wrapper keeps card + clip name together and centred ── */
        #main-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: stretch;
            width: 80vw;
            max-width: 1200px;
        }

        /* ── Clip Name (above card) ── */
        #clip-name-row {
            padding: 0.4em 1em 0.2em;
            cursor: ns-resize;
            user-select: none;
            line-height: 1.4;
            text-align: center;
            /* scale from text centre */
            transform-origin: center center;
            transition: transform 0.08s ease;
        }
        #clip-name-row .row-label { color: #888; font-weight: 400; }
        #clip-name-row .row-value { color: #ffffff; font-weight: 600; }

        /* ── Card boundary ── */
        #tableborder {
            border: 6px solid #4b5457;
            border-radius: 40px;
            background-color: #111417;
            padding: 0.6em 0 0.8em;
            /* no fixed width — stretches with wrapper */
        }

        /* ── Info rows inside card ── */
        .info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.15em 1.5em;
            cursor: ns-resize;
            user-select: none;
            /* scale from text centre */
            transform-origin: center center;
            transition: transform 0.08s ease;
        }
        .info-row:hover { background: rgba(255,255,255,0.03); }

        .row-label {
            text-align: right;
            color: #888888;
            font-weight: 400;
            white-space: nowrap;
            width: 9em;
            padding-right: 0.8em;
            /* label uses a fixed smaller base size; JS scales the whole row */
            font-size: 0.55em;
        }
        .row-value {
            text-align: left;
            font-weight: 100;
            letter-spacing: 0.04em;
            width: 12em;
        }

        .elapsed-value  { color: #45aaff; }
        .remain-value   { color: #ff9945; }
        .total-value    { color: #aaaaaa; }
        .clock-value    { color: #aaaaaa; }

        /* scroll hint */
        .info-row:hover::after, #clip-name-row:hover::after {
            content: '↕ scroll to resize';
            font-size: 0.55em;
            color: #555;
            margin-left: 1.2em;
            font-weight: 400;
            white-space: nowrap;
        }

        /* ── Settings panel ── */
        #settings-panel {
            text-align: left;
            margin-left: 2em;
            margin-top: 1em;
        }
    </style>
</head>

<body>

<div id="main-wrapper">
    <!-- Clip Name — outside and above the card -->
    <div id="clip-name-row" data-key="clipname">
        <span class="row-label">Clip </span><span class="row-value" id="clipname">None</span>
    </div>

    <!-- Main card -->
    <div id="tableborder">
        <div class="info-row" data-key="elapsed">
            <span class="row-label">Elapsed</span>
            <span class="row-value elapsed-value" id="info-elapsed">+00:00:00.000</span>
        </div>
        <div class="info-row" data-key="remaining">
            <span class="row-label">Remaining</span>
            <span class="row-value remain-value" id="info-remaining">-00:00:00.000</span>
        </div>
        <div class="info-row" data-key="total">
            <span class="row-label">Clip Length</span>
            <span class="row-value total-value" id="info-total">00:00:00.000</span>
        </div>
        <div class="info-row" data-key="clock">
            <span class="row-label">System Time</span>
            <span class="row-value clock-value" id="system-clock">--:--:--</span>
        </div>
    </div>
</div>

<!-- Settings -->
<details id="settings-panel">
    <summary style="font-size:1.25em;">Settings</summary>
    <div>Clip Length: <strong id="ms">00:00:00.000</strong></div>
    <div>Server Status: <strong id="status">Server Stopped</strong></div>
    <br/>
    <div>
        <button onclick="resetSizes()" style="font-family:inherit;padding:0.3em 1em;border-radius:6px;cursor:pointer;background:#222;color:#ccc;border:1px solid #555;">Reset row sizes</button>
    </div>
    <br/>
    <div>
    <input type="number" id="padding" value="0" min="0" step="1" onchange="updatePadding()" style="width:3em;border-radius:5px;margin-left:2px;">
    <label style="margin-left:-0.5em;" for="padding">em Top Padding</label>
    </div>
    <p>Fork of <a href="https://github.com/chabad360/resolume-timecode">chabad360/resolume-timecode</a></p>
</details>

<script src="osc.min.js" type="module"></script>
<script src="main.js" type="module"></script>
<script type="text/javascript">

    // ── Default scale multipliers (1.0 = base size) ──
    // Base font size for each row is set in CSS via font-size on .row-value (3vw).
    // We use CSS transform:scale() so the text always grows from its own centre.
    const DEFAULTS = {
        clipname:  1.0,
        elapsed:   1.5,
        remaining: 1.5,
        total:     1.0,
        clock:     1.0,
    };

    // Base vw for each row's .row-value font-size (set via CSS initially)
    const BASE_VW = 3.0;  // all rows share the same base font-size in CSS

    const MIN_SCALE = 0.3;
    const MAX_SCALE = 6.0;
    const STEP      = 0.08;

    // Load saved scales from localStorage
    const scales = {};
    for (const key in DEFAULTS) {
        const saved = localStorage.getItem('row-scale-' + key);
        scales[key] = saved !== null ? parseFloat(saved) : DEFAULTS[key];
    }

    // Apply scale via CSS transform — origin is centre of the element
    function applyScale(key) {
        const s = scales[key];
        const el = key === 'clipname'
            ? document.getElementById('clip-name-row')
            : document.querySelector(`.info-row[data-key="${key}"]`);
        if (!el) return;
        el.style.transform = `scale(${s})`;
        // Push adjacent rows away by adjusting vertical margin based on scale
        // Row natural height ≈ BASE_VW * 1.4vw; extra space needed = (scale-1) * half-height
        const naturalH = BASE_VW * 1.4 / 100 * window.innerWidth; // px
        const extra = (s - 1) * naturalH * 0.5;
        el.style.marginTop    = extra + 'px';
        el.style.marginBottom = extra + 'px';
        localStorage.setItem('row-scale-' + key, s);
    }

    // Apply all on load
    for (const key in scales) applyScale(key);
    // Re-apply on resize so margin px values stay accurate
    window.addEventListener('resize', () => { for (const key in scales) applyScale(key); });

    // Scroll handler
    function onRowWheel(e) {
        e.preventDefault();
        const key = e.currentTarget.dataset.key;
        if (!key || !(key in scales)) return;
        const delta = e.deltaY > 0 ? -STEP : STEP;
        scales[key] = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scales[key] + delta));
        applyScale(key);
    }

    document.querySelectorAll('.info-row, #clip-name-row').forEach(row => {
        row.addEventListener('wheel', onRowWheel, { passive: false });
    });

    function resetSizes() {
        for (const key in DEFAULTS) {
            scales[key] = DEFAULTS[key];
            applyScale(key);
        }
    }

    function updatePadding() {
        const padding = document.getElementById('padding').value;
        document.getElementById('main-wrapper').style.marginTop = padding + 'em';
    }

    updatePadding();
</script>
</body>
</html>
