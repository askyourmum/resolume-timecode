<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Timecode Monitor</title>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100;400;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #FDFBF7;
            font-family: 'Roboto Mono', monospace;
            font-size: 1em;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        a { color: #2494ff; }
        label { margin-right: 1em; }

        /* ── Wrapper keeps card + clip name together and centred ── */
        #main-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: stretch;
        }

        /* ── Clip Name (above card) ── */
        #clip-name-row {
            padding: 0.4em 1em 0.2em;
            user-select: none;
            line-height: 1.4;
            text-align: center;
            cursor: ew-resize;
        }
        #clip-name-row .row-label { color: #888; font-weight: 400; }
        #clip-name-row .row-value { color: #ffffff; font-weight: 600; }

        /* ── Card boundary ── */
        #tableborder {
            border: 6px solid #4b5457;
            border-radius: 40px;
            background-color: #111417;
            padding: 0.6em 0 0.8em;
            cursor: ew-resize;
            user-select: none;
        }

        /* ── Info rows inside card ── */
        .info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.15em 1.5em;
            cursor: ew-resize;
            user-select: none;
        }
        .info-row:hover { background: rgba(255,255,255,0.03); }

        .row-label {
            text-align: right;
            color: #888888;
            font-weight: 400;
            white-space: nowrap;
            width: 9em;
            padding-right: 0.8em;
            font-size: 0.55em;
        }
        .row-value {
            text-align: left;
            font-weight: 100;
            letter-spacing: 0.04em;
            width: 12em;
        }

        .elapsed-value  { color: #45aaff; }
        .remain-value   { color: #ff9945; }
        .total-value    { color: #aaaaaa; }
        .clock-value    { color: #aaaaaa; }

        /* drag hint */
        .info-row:hover::after, #clip-name-row:hover::after {
            content: '↔ drag to resize';
            font-size: 0.55em;
            color: #555;
            margin-left: 1.2em;
            font-weight: 400;
            white-space: nowrap;
        }
        #tableborder:hover::after {
            content: '↔ drag to scale all';
            font-size: 0.6em;
            color: #444;
            display: block;
            text-align: center;
            margin-top: 0.3em;
            font-weight: 400;
        }

        /* ── Settings panel ── */
        #settings-panel {
            text-align: left;
            margin-left: 2em;
            margin-top: 1em;
        }
    </style>
</head>

<body>

<div id="main-wrapper">
    <!-- Clip Name — outside and above the card -->
    <div id="clip-name-row" data-key="clipname">
        <span class="row-label">Clip </span><span class="row-value" id="clipname">None</span>
    </div>

    <!-- Main card -->
    <div id="tableborder">
        <div class="info-row" data-key="elapsed">
            <span class="row-label">Elapsed</span>
            <span class="row-value elapsed-value" id="info-elapsed">+00:00:00.000</span>
        </div>
        <div class="info-row" data-key="remaining">
            <span class="row-label">Remaining</span>
            <span class="row-value remain-value" id="info-remaining">-00:00:00.000</span>
        </div>
        <div class="info-row" data-key="total">
            <span class="row-label">Clip Length</span>
            <span class="row-value total-value" id="info-total">00:00:00.000</span>
        </div>
        <div class="info-row" data-key="clock">
            <span class="row-label">System Time</span>
            <span class="row-value clock-value" id="system-clock">--:--:--</span>
        </div>
    </div>
</div>

<!-- Settings -->
<details id="settings-panel">
    <summary style="font-size:1.25em;">Settings</summary>
    <div>Clip Length: <strong id="ms">00:00:00.000</strong></div>
    <div>Server Status: <strong id="status">Server Stopped</strong></div>
    <br/>
    <div>
        <button onclick="resetSizes()" style="font-family:inherit;padding:0.3em 1em;border-radius:6px;cursor:pointer;background:#222;color:#ccc;border:1px solid #555;">Reset row sizes</button>
    </div>
    <br/>
    <div>
    <input type="number" id="padding" value="0" min="0" step="1" onchange="updatePadding()" style="width:3em;border-radius:5px;margin-left:2px;">
    <label style="margin-left:-0.5em;" for="padding">em Top Padding</label>
    </div>
    <p>Fork of <a href="https://github.com/chabad360/resolume-timecode">chabad360/resolume-timecode</a></p>
</details>

<script src="osc.min.js" type="module"></script>
<script src="main.js" type="module"></script>
<script type="text/javascript">

    // ── Per-row font sizes in vw ──
    // Each row's .row-value font-size is set directly in vw via JS.
    // No transform:scale — rows naturally expand/contract in the layout.
    const DEFAULTS = {
        clipname:  3.0,
        elapsed:   4.5,
        remaining: 4.5,
        total:     3.0,
        clock:     3.0,
    };

    // Global scale multiplier applied on top of all individual row sizes
    let globalScale = parseFloat(localStorage.getItem('global-scale') || '1.0');

    const MIN_VW    = 0.5;
    const MAX_VW    = 20.0;
    const DRAG_SENS = 0.04; // vw per px of horizontal drag

    // Load saved per-row vw values
    const sizes = {};
    for (const key in DEFAULTS) {
        const saved = localStorage.getItem('row-vw-' + key);
        sizes[key] = saved !== null ? parseFloat(saved) : DEFAULTS[key];
    }

    // Return the DOM element for a row key
    function rowEl(key) {
        return key === 'clipname'
            ? document.getElementById('clip-name-row')
            : document.querySelector(`.info-row[data-key="${key}"]`);
    }

    // Apply font-size in vw to .row-value (and proportionally to .row-label) for a row
    function applySize(key) {
        const el = rowEl(key);
        if (!el) return;
        const vw = Math.min(MAX_VW, Math.max(MIN_VW, sizes[key] * globalScale));
        const valueEl = el.querySelector('.row-value');
        if (valueEl) valueEl.style.fontSize = vw + 'vw';
        // label stays at 55% of value size
        const labelEl = el.querySelector('.row-label');
        if (labelEl) labelEl.style.fontSize = (vw * 0.55) + 'vw';
        localStorage.setItem('row-vw-' + key, sizes[key]);
    }

    function applyAll() {
        for (const key in sizes) applySize(key);
        localStorage.setItem('global-scale', globalScale);
    }

    // Apply on load
    applyAll();

    // ── Horizontal drag to resize individual rows ──
    (function () {
        let dragging = null; // { key, startX, startSize }

        function onMouseDown(e) {
            // Don't start drag on settings panel children
            if (e.target.closest('#settings-panel')) return;
            const row = e.target.closest('.info-row, #clip-name-row');
            if (!row) return;
            const key = row.dataset.key;
            if (!key || !(key in sizes)) return;
            e.preventDefault();
            dragging = { key, startX: e.clientX, startSize: sizes[key] };
            document.body.style.cursor = 'ew-resize';
        }

        function onMouseMove(e) {
            if (!dragging) return;
            const dx = e.clientX - dragging.startX;
            const newSize = dragging.startSize + dx * DRAG_SENS;
            sizes[dragging.key] = Math.min(MAX_VW, Math.max(MIN_VW, newSize));
            applySize(dragging.key);
        }

        function onMouseUp() {
            if (!dragging) return;
            localStorage.setItem('row-vw-' + dragging.key, sizes[dragging.key]);
            dragging = null;
            document.body.style.cursor = '';
        }

        document.addEventListener('mousedown', onMouseDown);
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup',   onMouseUp);
    })();

    // ── Horizontal drag on card border = global scale ──
    (function () {
        let dragging = null; // { startX, startScale }

        function isBorderOnly(e) {
            // Only trigger when clicking directly on #tableborder, not on its children
            return e.target.id === 'tableborder';
        }

        function onMouseDown(e) {
            if (!isBorderOnly(e)) return;
            e.preventDefault();
            dragging = { startX: e.clientX, startScale: globalScale };
            document.body.style.cursor = 'ew-resize';
        }

        function onMouseMove(e) {
            if (!dragging) return;
            const dx = e.clientX - dragging.startX;
            // Global scale: each 100px = +/- 0.2 scale (gentler than per-row)
            const newScale = dragging.startScale + dx * 0.002;
            globalScale = Math.min(5.0, Math.max(0.1, newScale));
            applyAll();
        }

        function onMouseUp() {
            if (!dragging) return;
            localStorage.setItem('global-scale', globalScale);
            dragging = null;
            document.body.style.cursor = '';
        }

        document.getElementById('tableborder').addEventListener('mousedown', onMouseDown);
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup',   onMouseUp);
    })();

    function resetSizes() {
        for (const key in DEFAULTS) sizes[key] = DEFAULTS[key];
        globalScale = 1.0;
        applyAll();
    }

    function updatePadding() {
        const padding = document.getElementById('padding').value;
        document.getElementById('main-wrapper').style.marginTop = padding + 'em';
    }

    updatePadding();
</script>
</body>
</html>
